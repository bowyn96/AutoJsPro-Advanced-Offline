# 在 GitHub 云端构建：AutojsPro（默认改版）与 AutojsPro_original 各生成一份已签名 APK
#
# 使用前请在仓库 Settings → Secrets and variables → Actions 中配置：
#   KEYSTORE_BASE64  本地 autojspro.jks 的 Base64（单行、无换行）。
#                    Linux/macOS: base64 -w0 autojspro.jks
#                    Windows PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes('autojspro.jks'))
#   KEYSTORE_PASS    密钥库密码
#   KEY_PASS         密钥密码
#   KEY_ALIAS        密钥别名
#
# 触发方式：
#   · Actions → Build APK → Run workflow：只构建并上传 Artifact，不创建 Release
#   · 在 main 上打并推送 v* 标签（如 v1.0.1）：构建 + 自动创建 GitHub Release 并附上 APK
name: Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
      KEY_PASS: ${{ secrets.KEY_PASS }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      _JAVA_OPTIONS: -Xmx6g
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK (build-tools / zipalign / apksigner)
        uses: android-actions/setup-android@v4
        with:
          packages: "build-tools;34.0.0 platform-tools"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare keystore from secret
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::未配置 Secret KEYSTORE_BASE64。请将 autojspro.jks 做 Base64 后写入仓库 Secrets。"
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > autojspro.jks
          if [ ! -s autojspro.jks ]; then
            echo "::error::解码后的 autojspro.jks 为空，请检查 KEYSTORE_BASE64 是否正确。"
            exit 1
          fi

      - name: Build signed APK (AutojsPro)
        run: python build.py -i AutojsPro -o AutoJsPro-signed.apk

      - name: Build signed APK (AutojsPro_original)
        run: python build.py -i AutojsPro_original -o AutojsPro_original-signed.apk

      - name: Upload Artifact — AutoJsPro-signed.apk
        uses: actions/upload-artifact@v4
        with:
          name: AutoJsPro-signed
          path: AutoJsPro-signed.apk
          if-no-files-found: error

      - name: Upload Artifact — AutojsPro_original-signed.apk
        uses: actions/upload-artifact@v4
        with:
          name: AutojsPro_original-signed
          path: AutojsPro_original-signed.apk
          if-no-files-found: error

      - name: Copy APK for Release 附件名
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cp AutoJsPro-signed.apk "AutoJsPro-signed-${{ github.ref_name }}.apk"
          cp AutojsPro_original-signed.apk "AutojsPro_original-signed-${{ github.ref_name }}.apk"

      - name: Create GitHub Release（仅推送 v* 标签时）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AutoJsPro-signed-${{ github.ref_name }}.apk
            AutojsPro_original-signed-${{ github.ref_name }}.apk
          generate_release_notes: true
