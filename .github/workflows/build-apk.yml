# 在 GitHub 云端构建 AutoJsPro-signed.apk
#
# 使用前请在仓库 Settings → Secrets and variables → Actions 中配置：
#   KEYSTORE_BASE64  本地 autojspro.jks 的 Base64（单行、无换行）。
#                    Linux/macOS: base64 -w0 autojspro.jks
#                    Windows PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes('autojspro.jks'))
#   KEYSTORE_PASS    密钥库密码
#   KEY_PASS         密钥密码
#   KEY_ALIAS        密钥别名
#
# 触发方式：Actions → Build APK → Run workflow；或推送 tag v*（如 v1.0.0）
name: Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK (build-tools / zipalign / apksigner)
        uses: android-actions/setup-android@v4
        with:
          packages: "build-tools;34.0.0 platform-tools"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare keystore from secret
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::未配置 Secret KEYSTORE_BASE64。请将 autojspro.jks 做 Base64 后写入仓库 Secrets。"
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > autojspro.jks
          if [ ! -s autojspro.jks ]; then
            echo "::error::解码后的 autojspro.jks 为空，请检查 KEYSTORE_BASE64 是否正确。"
            exit 1
          fi

      - name: Build signed APK
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          _JAVA_OPTIONS: -Xmx6g
        run: python build.py

      - name: Upload AutoJsPro-signed.apk
        uses: actions/upload-artifact@v4
        with:
          name: AutoJsPro-signed
          path: AutoJsPro-signed.apk
          if-no-files-found: error
